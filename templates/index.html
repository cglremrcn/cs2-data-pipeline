<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CS2 Kill Detector</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="logo">
                <span class="logo-icon">&#8982;</span>
                <h1>CS2 <span>Kill Detector</span></h1>
            </div>
            <p class="tagline">Detect personal kill moments from CS2 gameplay clips</p>
        </header>

        <!-- URL Input -->
        <div class="card">
            <div class="card-header">
                <span class="card-label">Process Video</span>
            </div>
            <div class="input-group">
                <input type="text" id="urlInput" placeholder="Paste a video URL (Medal.tv, YouTube, Twitch...)"
                       autocomplete="off" spellcheck="false">
                <button class="btn btn-primary" id="startBtn" onclick="startPipeline()">
                    Process
                </button>
            </div>
        </div>

        <!-- Status Section -->
        <div class="card status-section" id="statusSection">
            <div class="card-header">
                <span class="card-label">Pipeline Status</span>
            </div>
            <div class="phases">
                <div class="phase" id="phase-download">
                    <div class="phase-dot"><span>1</span></div>
                    <div class="phase-label">Download</div>
                </div>
                <div class="phase" id="phase-detect">
                    <div class="phase-dot"><span>2</span></div>
                    <div class="phase-label">Detect</div>
                </div>
                <div class="phase" id="phase-cut">
                    <div class="phase-dot"><span>3</span></div>
                    <div class="phase-label">Extract</div>
                </div>
                <div class="phase" id="phase-metadata">
                    <div class="phase-dot"><span>4</span></div>
                    <div class="phase-label">Metadata</div>
                </div>
            </div>
            <div class="status-bar">
                <div class="spinner" id="statusSpinner"></div>
                <span class="status-text" id="statusText">Initializing...</span>
            </div>
        </div>

        <!-- Results Section -->
        <div class="card results-section" id="resultsSection">
            <div class="card-header">
                <span class="card-label">Results</span>
            </div>
            <div class="stat-grid">
                <div class="stat-card">
                    <div class="stat-value" id="statKills">0</div>
                    <div class="stat-label">Kills Found</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="statClips">0</div>
                    <div class="stat-label">Frames Saved</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="statTime">0s</div>
                    <div class="stat-label">Processing Time</div>
                </div>
            </div>
            <div class="kill-frames" id="killFrames"></div>
        </div>

        <!-- History -->
        <div class="card">
            <div class="card-header">
                <span class="card-label">Recent Sessions</span>
            </div>
            <div class="history-list" id="historyList">
                <div class="history-empty">Loading...</div>
            </div>
        </div>

        <footer class="footer">CS2 Data Pipeline v4.0</footer>
    </div>

    <script>
        let currentSessionId = null;
        let pollInterval = null;

        // ============================================================
        // Pipeline Processing
        // ============================================================

        function startPipeline() {
            const url = document.getElementById('urlInput').value.trim();
            if (!url) return;

            document.getElementById('startBtn').disabled = true;
            document.getElementById('statusSection').classList.add('active');
            document.getElementById('resultsSection').classList.remove('active');
            resetPhases();

            fetch('/api/process', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({url})
            })
            .then(r => r.json())
            .then(data => {
                if (data.error) {
                    showError(data.error);
                    return;
                }
                currentSessionId = data.session_id;
                pollInterval = setInterval(pollStatus, 1000);
            })
            .catch(err => showError(err.message));
        }

        function pollStatus() {
            if (!currentSessionId) return;

            fetch(`/api/status/${currentSessionId}`)
            .then(r => {
                if (r.status === 404) {
                    clearInterval(pollInterval);
                    showError('Session lost (server restarted). Please try again.');
                    loadHistory();
                    return null;
                }
                return r.json();
            })
            .then(data => {
                if (!data) return;
                updateStatus(data.status);

                if (data.done) {
                    clearInterval(pollInterval);
                    document.getElementById('startBtn').disabled = false;

                    if (data.result && data.result.status === 'completed') {
                        showResults(data.result);
                    } else if (data.result && data.result.status === 'no_kills') {
                        document.getElementById('statusText').textContent = 'No kills detected.';
                        document.getElementById('statusText').className = 'status-text status-error';
                        document.getElementById('statusSpinner').style.display = 'none';
                    } else if (data.result && data.result.error) {
                        showError(data.result.error);
                    }
                    loadHistory();
                }
            });
        }

        function updateStatus(status) {
            const text = document.getElementById('statusText');
            text.textContent = status.message || '';

            const phaseMap = {
                'downloading': 'download',
                'detecting': 'detect',
                'cutting': 'cut',
                'metadata': 'metadata',
                'done': 'metadata',
            };

            const phases = ['download', 'detect', 'cut', 'metadata'];
            const currentIdx = phases.indexOf(phaseMap[status.phase] || '');

            phases.forEach((p, i) => {
                const el = document.getElementById(`phase-${p}`);
                el.className = 'phase';
                if (i < currentIdx) el.classList.add('done');
                else if (i === currentIdx) el.classList.add('active');
            });

            if (status.phase === 'done') {
                phases.forEach(p => {
                    document.getElementById(`phase-${p}`).className = 'phase done';
                });
                text.className = 'status-text status-done';
                document.getElementById('statusSpinner').style.display = 'none';
            }
        }

        function showResults(result) {
            document.getElementById('resultsSection').classList.add('active');
            document.getElementById('statKills').textContent = result.kills_detected;
            document.getElementById('statClips').textContent = result.clips_created;
            document.getElementById('statTime').textContent = result.processing_time + 's';

            if (result.metadata_path) {
                fetch(`/api/status/${currentSessionId}`)
                .then(r => r.json())
                .then(data => {
                    if (data.result) {
                        populateDetections(data.result);
                    }
                });
            }
        }

        function populateDetections(result) {
            const container = document.getElementById('killFrames');
            container.innerHTML = '';

            if (!result.clip_paths) return;

            result.clip_paths.forEach((framePath, i) => {
                const card = document.createElement('div');
                card.className = 'kill-frame-card';
                card.innerHTML = `
                    <div class="kill-frame-header">Kill ${i + 1}</div>
                    <a href="/${framePath}" target="_blank">
                        <img src="/${framePath}" alt="Kill ${i + 1}" class="kill-frame-img">
                    </a>
                `;
                container.appendChild(card);
            });
        }

        function resetPhases() {
            ['download', 'detect', 'cut', 'metadata'].forEach(p => {
                document.getElementById(`phase-${p}`).className = 'phase';
            });
            document.getElementById('statusSpinner').style.display = '';
            document.getElementById('statusText').className = 'status-text';
        }

        function showError(msg) {
            document.getElementById('statusText').textContent = 'Error: ' + msg;
            document.getElementById('statusText').className = 'status-text status-error';
            document.getElementById('statusSpinner').style.display = 'none';
            document.getElementById('startBtn').disabled = false;
        }

        // ============================================================
        // History
        // ============================================================

        function loadHistory() {
            fetch('/api/sessions')
            .then(r => r.json())
            .then(sessions => {
                const list = document.getElementById('historyList');
                if (!sessions.length) {
                    list.innerHTML = '<div class="history-empty">No sessions yet.</div>';
                    return;
                }

                list.innerHTML = sessions.map(s => `
                    <div class="history-item">
                        <div>
                            <div class="history-id">${s.session_id}</div>
                            <div class="history-date">${s.created_at.split('T')[0] || ''}</div>
                        </div>
                        <span class="kills-badge">${s.kills} kills</span>
                    </div>
                `).join('');
            });
        }

        // On page load
        loadHistory();

        // Enter key triggers start
        document.getElementById('urlInput').addEventListener('keydown', e => {
            if (e.key === 'Enter') startPipeline();
        });
    </script>
</body>
</html>
